services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      WATCHPACK_POLLING: "true"
    env_file:
      - .env.local
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  node_modules:
  next_cache:
